[project]
name = "data_bridges_client"
version = "9.1.0"
description = "VAMDataBridges"
authors = [{ name = "VAM-INFO", email = "wfp.economicanalysis@wfp.org" }]
requires-python = ">=3.10"
readme = "README.md"
keywords = [
    "OpenAPI",
    "OpenAPI-Generator",
    "VAMDataBridges",
]
dependencies = [
    "urllib3>=2.7.0,<3.0.0",
    "python-dateutil (>=2.8.2)",
    "pydantic (>=2.11)",
    "typing-extensions (>=4.7.1)",
    "httpx>=0.28.1",
]

[project.urls]
Repository = "https://github.com/WFP-VAM/DataBridgesAPI"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>= 2.8.1",
    "tox>= 3.9.0",
    "flake8>= 4.0.0",
    "types-python-dateutil>= 2.8.19.14",
    "mypy>= 1.5",
    "isort>=6.1.0",
    "black>=25.11.0",
    "ruff>=0.15.15",
]

[tool.uv]
default-groups = "all"
index-strategy = "unsafe-best-match"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.pylint.'MESSAGES CONTROL']
extension-pkg-whitelist = "pydantic"

[tool.mypy]
files = [
  "data_bridges_client",
  # "test",  # auto-generated tests
  "tests", # hand-written tests
]
# TODO: enable "strict" once all these individual checks are passing
# strict = true

# List from: https://mypy.readthedocs.io/en/stable/existing_code.html#introduce-stricter-options
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true

## Getting these passing should be easy
strict_equality = true
extra_checks = true

## Strongly recommend enabling this one as soon as you can
check_untyped_defs = true

## These shouldn't be too much additional work, but may be tricky to
## get passing if you use a lot of untyped libraries
disallow_subclassing_any = true
disallow_untyped_decorators = true
disallow_any_generics = true

### These next few are various gradations of forcing use of type annotations
#disallow_untyped_calls = true
#disallow_incomplete_defs = true
#disallow_untyped_defs = true
#
### This one isn't too hard to get passing, but return on investment is lower
#no_implicit_reexport = true
#
### This one can be tricky to get passing if you use a lot of untyped libraries
#warn_return_any = true

[[tool.mypy.overrides]]
module = [
  "data_bridges_client.configuration",
]
warn_unused_ignores = true
strict_equality = true
extra_checks = true
check_untyped_defs = true
disallow_subclassing_any = true
disallow_untyped_decorators = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
no_implicit_reexport = true
warn_return_any = true

[tool.setuptools]
packages = ["data_bridges_client"]

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"




