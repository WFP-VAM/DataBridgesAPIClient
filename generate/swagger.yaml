  /Currency/UsdIndirectQuotation:
    get:
      tags:
      - Currency
      summary: Returns the value of the Exchange rates from Trading Economics, for official rates, and DataViz for unofficial rates.
      description: "\n\n![Generic badge](https://img.shields.io/badge/Maturity%20Level-Production%20Ready-green)\n\n![Generic badge](https://img.shields.io/badge/Access_Policy-TEC_Architecture_approval_required-yellow)\n\n![Generic badge](https://img.shields.io/badge/Data%20Classification-Public-green)\n\n### This endpoint is restricted, it requires the permission: \"vamdatabridges\\_currency-usdindirectquotation\\_get\"\n\nReturns the time series of values of the Exchange rate of the Local Currency for buying 1 USD in the official market. Original frequency for official rates is daily, non-indicated. Unofficial rates are aggregated at national level by the original frequency of collection. For greater detail on unofficial exchange rates, explore the Exchange Rate (unofficial) commodity in Market Prices Prices. No mandatory parameter.\n\n\n\n**Data Controller** - Wael ATTIA\n\n**API Integration Pattern** - This endpoint uses [Hey Jude](https://docs.api.wfp.org/providers/#api-patterns) pattern"
      parameters:
      - name: countryIso3
        in: query
        description: The code to identify the country. Must be a ISO-3166 Alpha 3 code.
        schema:
          type: string
          default: ''
      - name: currencyName
        in: query
        description: the ISO3 code for the currency, based on ISO4217
        schema:
          type: string
          default: ''
      - name: page
        in: query
        description: Page number for paged results
        schema:
          type: integer
          format: int32
          default: 1
      - name: format
        in: query
        description: 'Output format: [JSON|CSV] Json is the default value'
        schema:
          type: string
          default: json
      - in: query
        name: env
        required: false
        schema:
          type: string
          enum:
          - prod
          - dev
        description: "Environment.\n  * `prod` - api.vam.wfp.org\n  * `dev` - dev.api.vam.wfp.org"
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/UsdIndirectQuotationPagedResult'
            application/json:
              schema:
                $ref: '#/components/schemas/UsdIndirectQuotationPagedResult'
            text/json:
              schema:
