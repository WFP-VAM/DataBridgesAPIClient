  /MarketPrices/PriceMonthly:
    get:
      tags:
      - MarketPrices
      summary: Returns a monthly time series of commodity market prices.
      description: "\n\n![Generic badge](https://img.shields.io/badge/Maturity%20Level-Production%20Ready-green)\n\n![Generic badge](https://img.shields.io/badge/Access_Policy-TEC_Architecture_approval_required-yellow)\n\n![Generic badge](https://img.shields.io/badge/Data%20Classification-Public-green)\n\n### This endpoint is restricted, it requires the permission: \"vamdatabridges\\_marketprices-pricemonthly\\_get\"\n\nThis is the lowest frequency available and the most complete data source. Data is flagged according to its pre-processing characteristics. actual data is collected originally with monthly frequency; aggregated data is collected with higher frequency (daily or weekly) averaged through a weighted mean to monthly; imputed data is an estimation of missing values in the time series, obtained through the R Amelia-II package; forecasted data is a six months prediction obtained through different methods, which are reported in the API. For country specific meta-data please refer to documentation available in [DataLibrary](https://datalib.vam.wfp.org/). For specific methodological notes on forecasts and imputations refer to the dedicated page in [DataViz](https://dataviz.vam.wfp.org/). Country code, either ISO-3166 Alpha 3 code or the VAM internal admin0code is mandatory.\n\n\n\n**Data Controller** - Wael ATTIA\n\n**API Integration Pattern** - This endpoint uses [Hey Jude](https://docs.api.wfp.org/providers/#api-patterns) pattern"
      parameters:
      - name: countryCode
        in: query
        description: The code to identify the country. It can be a ISO-3166 Alpha 3 code or the VAM internal admin0code.
        schema:
          type: string
      - name: marketID
        in: query
        description: Unique ID of a Market, as found in /Markets/GeoJSONList
        schema:
          type: integer
          format: int32
          default: 0
      - name: commodityID
        in: query
        description: The exact ID of a Commodity, as found in /Commodities/List
        schema:
          type: integer
          format: int32
          default: 0
      - name: priceTypeName
        in: query
        description: 'Price type: [retail|wholesale|farmgate]'
        schema:
          type: string
          default: ''
      - name: currencyID
        in: query
        description: The exact ID of a currency, as found in /Currency/List
        schema:
          type: integer
          format: int32
          default: 0
      - name: priceFlag
        in: query
        description: 'Type of price data: [actual|aggregate|estimated|forecasted]'
        schema:
          type: string
          default: ''
      - name: startDate
        in: query
        description: Starting date for the range in which data was collected. Use the date formats defined by RFC 3339 ; use strings matching year \"-\" month \"-\" day (e.g. 2020/06/24)
        schema:
          type: string
          format: date-time
      - name: endDate
        in: query
        description: Ending date for the range in which data was collected. Use the date formats defined by RFC 3339 ; use strings matching year \"-\" month \"-\" day (e.g. 2020/06/24)
        schema:
          type: string
          format: date-time
      - name: latestValueOnly
        in: query
        description: '[TRUE|FALSE]'
        schema:
          type: boolean
          default: false
      - name: page
        in: query
        description: Page number for paged results
        schema:
          type: integer
          format: int32
          default: 1
      - name: format
        in: query
        description: 'Output format: [JSON|CSV] Json is the default value'
        schema:
          type: string
          default: json
      - in: query
        name: env
        required: false
        schema:
          type: string
          enum:
          - prod
          - dev
        description: "Environment.\n  * `prod` - api.vam.wfp.org\n  * `dev` - dev.api.vam.wfp.org"
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ViewExtendedMonthlyAggregatedPricePagedResult'
            application/json:
              schema:
