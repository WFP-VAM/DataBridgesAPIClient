      x-throttling-tier: Unlimited
  /EconomicData/{indicatorName}:
    get:
      tags:
      - EconomicData
      summary: Returns the time series of values for different indicators.
      description: "\n\n![Generic badge](https://img.shields.io/badge/Maturity%20Level-Production%20Ready-green)\n\n![Generic badge](https://img.shields.io/badge/Access_Policy-TEC_Architecture_approval_required-yellow)\n\n![Generic badge](https://img.shields.io/badge/Data%20Classification-Public-green)\n\n### This endpoint is restricted, it requires the permission: \"vamdatabridges\\_economicdata\\_get\"\n\nIndicator name as retrieved from /EconomicData/IndicatorList is mandatory.\n\n\n\n**Data Controller** - Wael ATTIA\n\n**API Integration Pattern** - This endpoint uses [Hey Jude](https://docs.api.wfp.org/providers/#api-patterns) pattern"
      parameters:
      - name: indicatorName
        in: path
        description: Name of the indicator as found in /EconomicData/IndicatorList.
        required: true
        schema:
          type: string
      - name: page
        in: query
        description: Page number for paged results
        schema:
          type: integer
          format: int32
          default: 1
      - name: iso3
        in: query
        description: The code to identify the country. Must be a ISO-3166 Alpha 3 code.
        schema:
          type: string
          default: ''
      - name: startDate
        in: query
        description: Starting date for the range in which data was collected. Use the date formats defined by RFC 3339 ; use strings matching year \"-\" month \"-\" day (e.g. 2020/06/24)
        schema:
          type: string
          format: date-time
      - name: endDate
        in: query
        description: Ending date for the range in which data was collected. Use the date formats defined by RFC 3339 ; use strings matching year \"-\" month \"-\" day (e.g. 2020/06/24)
        schema:
          type: string
          format: date-time
      - name: format
        in: query
        description: 'Output format: [JSON|CSV] Json is the default value'
        schema:
          type: string
          default: json
      - in: query
        name: env
        required: false
        schema:
          type: string
          enum:
          - prod
          - dev
        description: "Environment.\n  * `prod` - api.vam.wfp.org\n  * `dev` - dev.api.vam.wfp.org"
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PagedEconomicDataDTO'
            application/json:
              schema:
                $ref: '#/components/schemas/PagedEconomicDataDTO'
            text/json:
              schema:
                $ref: '#/components/schemas/PagedEconomicDataDTO'
        '400':
          description: Bad Request
