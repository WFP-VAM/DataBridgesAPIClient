openapi: 3.0.0
info:
  title: "VAMDataBridges"
  version: "v1"
  contact:
    name: VAM-INFO
    email: wfp.economicanalysis@wfp.org
  description: 'API Documentation of the **DataBridges** platform: https://databridges.vam.wfp.org/. For API discussions and details: #api-integration-vam-data-bridges on Slack, [Teams channel](https://teams.microsoft.com/l/team/19%3a4ca595f7681f4ffa8a86b7af58832e8d%40thread.skype/conversations?groupId=cbd1e508-c6e8-459d-96b7-6cac3039c42c&tenantId=462ad9ae-d7d9-4206-b874-71b1e079776f) **API Integration** - This endpoint uses [Hey Jude](https://docs.api.wfp.org/providers/#api-patterns) pattern'
paths:
  /Cari/Adm0Values:
    get:
      tags:
      - Incubation
      summary: "Retrieves a paginated list of Adm0 CARI results based on the specified indicator, administrative code, and\r\nsurvey."
      description: "\n\n![Generic badge](https://img.shields.io/badge/Maturity%20Level-Incubation-red)\n\n![Generic badge](https://img.shields.io/badge/Access_Policy-TEC_Architecture_approval_required-yellow)\n\n![Generic badge](https://img.shields.io/badge/Data%20Classification-Public-green)\n\n### This endpoint is restricted, it requires the permission: \"vamdatabridges\\_cari-adm0values\\_get\"\n\nThis method returns a paginated list of results based on the provided filters. Ensure\r\n            that the parameters are valid and correspond to existing data in the repository. If an error occurs during\r\n            processing, a bad request response is returned with the error details.\n\n\n\n**Data Controller** - Wael ATTIA\n\n**API Integration Pattern** - This endpoint uses [Hey Jude](https://docs.api.wfp.org/providers/#api-patterns) pattern"
      parameters:
      - name: adm0Code
        in: query
        description: The administrative level 0 code to filter the results.
        schema:
          type: integer
          format: int32
      - name: surveyId
        in: query
        description: The unique identifier of the survey to filter the results.
        schema:
          type: integer
          format: int32
      - name: indicatorId
        in: query
        description: The unique identifier of the indicator to filter the results.
        schema:
          type: integer
          format: int32
      - name: page
        in: query
        description: The page number for pagination. Defaults to 1.
        schema:
          type: integer
          format: int32
          default: 1
      - in: query
        name: env
        required: false
        schema:
          type: string
          enum:
          - prod
          - dev
        description: "Environment.\n  * `prod` - api.vam.wfp.org\n  * `dev` - dev.api.vam.wfp.org"
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/CariAdm0ValuesDTOPagedResult'
            application/json:
              schema:
                $ref: '#/components/schemas/CariAdm0ValuesDTOPagedResult'
            text/json:
              schema:
                $ref: '#/components/schemas/CariAdm0ValuesDTOPagedResult'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/BadRequestDTO'
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestDTO'
            text/json:
              schema:
                $ref: '#/components/schemas/BadRequestDTO'
      x-auth-type: Application & Application User
      x-throttling-tier: Unlimited
