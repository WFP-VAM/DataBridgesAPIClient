  /Commodities/List:
    get:
      tags:
      - Commodities
      summary: Provide the detailed list of the commodities available in DataBridges platform
      description: "\n\n![Generic badge](https://img.shields.io/badge/Maturity%20Level-Production%20Ready-green)\n\n![Generic badge](https://img.shields.io/badge/Access_Policy-TEC_Architecture_approval_required-yellow)\n\n![Generic badge](https://img.shields.io/badge/Data%20Classification-Public-green)\n\n### This endpoint is restricted, it requires the permission: \"vamdatabridges\\_commodities-list\\_get\"\n\nCOICOP 2018 codes are returned to hierarchically matching categories based on [UN-Statistical Division codes](https://unstats.un.org/unsd/classifications/Econ/). No mandatory parameter.\n\n\n\n**Data Controller** - Wael ATTIA\n\n**API Integration Pattern** - This endpoint uses [Hey Jude](https://docs.api.wfp.org/providers/#api-patterns) pattern"
      parameters:
      - name: countryCode
        in: query
        description: The code to identify the country. It can be a ISO-3166 Alpha 3 code or the VAM internal admin0code
        schema:
          type: string
      - name: commodityName
        in: query
        description: The name, even partial and case insensitive, of a commodity
        schema:
          type: string
      - name: commodityID
        in: query
        description: The exact ID of a commodity
        schema:
          type: integer
          format: int32
          default: 0
      - name: page
        in: query
        description: page number for paged results
        schema:
          type: integer
          format: int32
          default: 1
      - name: format
        in: query
        description: 'Output format: [JSON|CSV] Json is the default value'
        schema:
          type: string
          default: json
      - in: query
        name: env
        required: false
        schema:
          type: string
          enum:
          - prod
          - dev
        description: "Environment.\n  * `prod` - api.vam.wfp.org\n  * `dev` - dev.api.vam.wfp.org"
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PagedCommodityListDTO'
            application/json:
              schema:
